<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>
  <!-- Green candlestick chart icon -->
  <!-- Candle 1 (leftmost) - green, bullish -->
  <rect x="10" y="28" width="6" height="18" rx="1" fill="#10b981"/>
  <line x1="13" y1="22" x2="13" y2="28" stroke="#10b981" stroke-width="2"/>
  <line x1="13" y1="46" x2="13" y2="50" stroke="#10b981" stroke-width="2"/>
  <!-- Candle 2 - red, bearish -->
  <rect x="21" y="32" width="6" height="12" rx="1" fill="#ef4444"/>
  <line x1="24" y1="26" x2="24" y2="32" stroke="#ef4444" stroke-width="2"/>
  <line x1="24" y1="44" x2="24" y2="48" stroke="#ef4444" stroke-width="2"/>
  <!-- Candle 3 - green, bullish -->
  <rect x="32" y="22" width="6" height="22" rx="1" fill="#10b981"/>
  <line x1="35" y1="16" x2="35" y2="22" stroke="#10b981" stroke-width="2"/>
  <line x1="35" y1="44" x2="35" y2="50" stroke="#10b981" stroke-width="2"/>
  <!-- Candle 4 (rightmost) - green, bullish large -->
  <rect x="43" y="18" width="6" height="26" rx="1" fill="#10b981"/>
  <line x1="46" y1="12" x2="46" y2="18" stroke="#10b981" stroke-width="2"/>
  <line x1="46" y1="44" x2="46" y2="52" stroke="#10b981" stroke-width="2"/>
</svg>
